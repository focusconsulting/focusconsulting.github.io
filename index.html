<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- 1. The core redirect command (0 means zero seconds delay) -->
    <meta http-equiv="refresh" content="0; url=https://focusconsulting.io">
    <!-- 2. Tells search engines where the actual content lives -->
    <link rel="canonical" href="https://focusconsulting.io/">
  </head>
  <body>
    <p>If you are not redirected automatically, follow this <a href="https://focusconsulting.io">link to the new website</a>.</p>
  </body>
</html>
